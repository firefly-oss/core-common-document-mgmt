          type: string
          description: Name of the signer
        signerEmail:
          type: string
          description: Email of the signer
          format: email
        signatureType:
          type: string
          description: Type of signature
          enum:
          - BASIC
          - ADVANCED
          - ADVANCED_WITH_QCERT
          - QUALIFIED
          - DIGITAL
          - BIOMETRIC
        signatureFormat:
          type: string
          description: Format of signature
          enum:
          - PADES
          - XADES
          - CADES
          - JADES
          - PDF_VISIBLE
          - PDF_INVISIBLE
          - TIMESTAMP
        signatureStatus:
          type: string
          description: Status of the signature
          enum:
          - PENDING
          - IN_PROGRESS
          - SIGNED
          - REJECTED
          - EXPIRED
          - REVOKED
          - FAILED
          - CANCELED
        signatureData:
          type: string
          description: Signature data (base64 encoded)
        signatureCertificate:
          type: string
          description: Signature certificate (base64 encoded)
        signaturePositionX:
          type: integer
          description: X position of the signature on the document
          format: int32
        signaturePositionY:
          type: integer
          description: Y position of the signature on the document
          format: int32
        signaturePage:
          type: integer
          description: Page number where the signature appears
          format: int32
        signatureWidth:
          type: integer
          description: Width of the signature
          format: int32
        signatureHeight:
          type: integer
          description: Height of the signature
          format: int32
        signatureReason:
          type: string
          description: Reason for signing
        signatureLocation:
          type: string
          description: Location where the document was signed
        signatureContactInfo:
          type: string
          description: Contact information of the signer
        expirationDate:
          type: string
          description: Date and time when the signature expires
          format: date-time
        signedAt:
          type: string
          description: Date and time when the document was signed
          format: date-time
        tenantId:
          type: string
          description: Tenant ID for multi-tenancy support
        customSignatureMessage:
          maxLength: 1000
          type: string
          description: "Custom message displayed to the signer during the signing\
            \ process. This message will be shown in the ECM provider's interface.\
            \ If not provided, defaults to configuration value."
          example: Please review and sign this important contract by Friday
        signerLanguage:
          pattern: "^[a-z]{2}$"
          type: string
          description: "ISO 639-1 language code for the signer's preferred language.\
            \ Determines the language of the ECM provider's signing interface. Supported\
            \ values: en, es, fr, de, it, pt, etc."
          example: en
          default: en
        signerTimeZone:
          type: string
          description: Time zone identifier for the signer. Used for displaying dates
            and times in the signer's local time zone during the signing process.
          example: America/New_York
          default: UTC
        signingOrder:
          maximum: 100
          minimum: 1
          type: integer
          description: Signing order for multiple signers. Determines the sequence
            in which signers must complete their signatures. Lower numbers sign first.
          format: int32
          example: 1
          default: 1
        signerRole:
          type: string
          description: "Role of the signer in the document workflow. Affects permissions\
            \ and display in the ECM provider interface. Valid values: Signer, Approver,\
            \ Reviewer, Witness, Notary, CC"
          example: Approver
          default: Signer
          enum:
          - Signer
          - Approver
          - Reviewer
          - Witness
          - Notary
          - CC
        signatureRequired:
          type: boolean
          description: "Whether this signature is required for document completion.\
            \ If false, the signature is optional and document can be completed without\
            \ it."
          example: true
          default: true
        authenticationMethod:
          type: string
          description: "Authentication method required before signing. Determines\
            \ how the signer must verify their identity before accessing the document.\
            \ Valid values: EMAIL, SMS, PHONE, ACCESS_CODE, ID_CHECK, NONE"
          example: EMAIL
          default: EMAIL
          enum:
          - EMAIL
          - SMS
          - PHONE
          - ACCESS_CODE
          - ID_CHECK
          - NONE
        externalSignerId:
          type: string
          description: "External signer ID assigned by the ECM provider (e.g., DocuSign\
            \ envelope ID). This field is populated automatically when the signature\
            \ request is created through an ECM provider and is used for tracking\
            \ and status updates."
          readOnly: true
          example: envelope-12345-abcdef
        signingUrl:
          type: string
          description: Direct URL for the signer to access the document for signing.
            Generated by the ECM provider and sent to the signer via email or other
            means. This URL is typically time-limited and signer-specific.
          readOnly: true
          example: https://demo.docusign.net/signing/startinsession.aspx?t=12345
        ecmMetadata:
          maxLength: 5000
          type: string
          description: "Additional metadata specific to the ECM provider. Can contain\
            \ provider-specific configuration, tracking information, or custom fields\
            \ in JSON format. Maximum 5000 characters."
          example: "{\"provider\":\"docusign\",\"templateId\":\"template-123\",\"\
            customFields\":{\"department\":\"legal\"}}"
        createdAt:
          type: string
          description: Date and time when the document signature was created
          format: date-time
          readOnly: true
        createdBy:
          type: string
          description: User who created the document signature
          readOnly: true
        updatedAt:
          type: string
          description: Date and time when the document signature was last updated
          format: date-time
          readOnly: true
        updatedBy:
          type: string
          description: User who last updated the document signature
          readOnly: true
        version:
          type: integer
          description: Version number for optimistic locking
          format: int64
          readOnly: true
      description: Document signature data transfer object
